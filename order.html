<h1 style="text-align:center;">Place Your Order ☕</h1>

<form style="max-width:500px; margin:auto;">

  <label>Name:</label><br>
  <input type="text" placeholder="Enter your name" required><br><br>

  <label>Phone:</label><br>
  <input type="text" placeholder="Enter phone number" required><br><br>

  <label>Select Coffee:</label><br>
  <select>
    <option>Cappuccino - ₹130</option>
    <option>Latte - ₹170</option>
    <option>Espresso - ₹150</option>
    <option>Cold Coffee - ₹120</option>
  </select><br><br>

  <label>Address:</label><br>
  <textarea placeholder="Enter your address"></textarea><br><br>

  <button type="submit">Place Order</button>

</form>
